# v++ link configuration for GPT-2 medium 3-chunk streaming design with
# an ingress router before chunk0 and an egress router after chunk2.
# U55C HBM2e: 32 pseudo-channels (2 stacks × 16), 256-bit AXI each, ~14.4 GB/s each
#
# HBM allocation (30 of 32 PCs used):
#   HBM[31]         : c0_router seed hidden input
#   HBM[30..23]     : chunk0 (attention)      8 widened 512-bit weight banks C0_B0..C0_B7
#   HBM[22]         : chunk0 metadata         biases + LN1 params
#   HBM[21]         : chunk0 KV-K low heads    (heads 0..7)
#   HBM[20]         : chunk0 KV-V low heads    (heads 0..7)
#   HBM[19]         : chunk0 KV-K high heads   (heads 8..15)
#   HBM[18]         : chunk0 KV-V high heads   (heads 8..15)
#   HBM[16..9]      : chunk1 (FC1 up-proj)    weight banks C1_B0..C1_B7
#   HBM[8..1]       : chunk2 (FC2 down-proj)  weight banks C2_B0..C2_B7
#   HBM[0]          : c2_router final hidden output
#
# Per-bank layout:
#   chunk0 C0_B* use packed_fxp64_t = 64-byte words
#   C0_B0..B7 (b0..b7): [0..6143] QKV_bk | [6144..8191] Wout_bk
#   chunk0 metadata is separate on HBM[22]:
#     [0..95] qkv_bias | [96..127] wout_bias | [128..159] ln1_beta | [160..191] ln1_gamma
#   C1_B0: [0..16383] FC1_b0 | [16384..16639] fc1_bias/ln2_beta/ln2_gamma
#   C1_B1..B7: [0..16383] FC1_bk
#   C2_B0: [0..16383] FC2_b0 | [16384..16415] fc2_bias
#   C2_B1..B7: [0..16383] FC2_bk

[connectivity]

nk=c0_router:1:c0_router_1
nk=chunk0_stream_ip:1:chunk0_stream_ip_1
nk=chunk1_stream_ip:1:chunk1_stream_ip_1
nk=chunk2_stream_ip:1:chunk2_stream_ip_1
nk=c2_router:1:c2_router_1

slr=c0_router_1:SLR0
slr=chunk0_stream_ip_1:SLR0
slr=chunk1_stream_ip_1:SLR0
slr=chunk2_stream_ip_1:SLR0
slr=c2_router_1:SLR0

stream_connect=c0_router_1.hidden_to_c0:chunk0_stream_ip_1.hidden_in:32
stream_connect=chunk0_stream_ip_1.hidden_mid_out:chunk1_stream_ip_1.hidden_mid_in:32
stream_connect=chunk0_stream_ip_1.bypass_out:chunk1_stream_ip_1.bypass_in:32
stream_connect=chunk1_stream_ip_1.gelu_out:chunk2_stream_ip_1.gelu_in:128
stream_connect=chunk1_stream_ip_1.bypass_out:chunk2_stream_ip_1.bypass_in:32
stream_connect=chunk2_stream_ip_1.hidden_out:c2_router_1.hidden_from_c2:32
stream_connect=c2_router_1.feedback_to_c0_p0:c0_router_1.feedback_in_p0:32
stream_connect=c2_router_1.feedback_to_c0_p1:c0_router_1.feedback_in_p1:32
stream_connect=c2_router_1.feedback_to_c0_p2:c0_router_1.feedback_in_p2:32

# --- c0_router seed hidden input → HBM[31] ---
sp=c0_router_1.seed_hidden_in:HBM[31]

# --- chunk0 (attention) → HBM[30..23] ---
sp=chunk0_stream_ip_1.b0:HBM[30]
sp=chunk0_stream_ip_1.b1:HBM[29]
sp=chunk0_stream_ip_1.b2:HBM[28]
sp=chunk0_stream_ip_1.b3:HBM[27]
sp=chunk0_stream_ip_1.b4:HBM[26]
sp=chunk0_stream_ip_1.b5:HBM[25]
sp=chunk0_stream_ip_1.b6:HBM[24]
sp=chunk0_stream_ip_1.b7:HBM[23]

sp=chunk0_stream_ip_1.meta_hbm:HBM[22]
sp=chunk0_stream_ip_1.kv_k_hbm_lo:HBM[21]
sp=chunk0_stream_ip_1.kv_v_hbm_lo:HBM[20]
sp=chunk0_stream_ip_1.kv_k_hbm_hi:HBM[19]
sp=chunk0_stream_ip_1.kv_v_hbm_hi:HBM[18]

# --- chunk1 (FFN up) → HBM[16..9] ---
sp=chunk1_stream_ip_1.fc1_b0:HBM[16]
sp=chunk1_stream_ip_1.fc1_bias:HBM[16]
sp=chunk1_stream_ip_1.ln2_beta:HBM[16]
sp=chunk1_stream_ip_1.ln2_gamma:HBM[16]
sp=chunk1_stream_ip_1.fc1_b1:HBM[15]
sp=chunk1_stream_ip_1.fc1_b2:HBM[14]
sp=chunk1_stream_ip_1.fc1_b3:HBM[13]
sp=chunk1_stream_ip_1.fc1_b4:HBM[12]
sp=chunk1_stream_ip_1.fc1_b5:HBM[11]
sp=chunk1_stream_ip_1.fc1_b6:HBM[10]
sp=chunk1_stream_ip_1.fc1_b7:HBM[9]

# --- chunk2 (FFN down) → HBM[8..1] ---
sp=chunk2_stream_ip_1.fc2_b0:HBM[8]
sp=chunk2_stream_ip_1.fc2_bias:HBM[8]
sp=chunk2_stream_ip_1.fc2_b1:HBM[7]
sp=chunk2_stream_ip_1.fc2_b2:HBM[6]
sp=chunk2_stream_ip_1.fc2_b3:HBM[5]
sp=chunk2_stream_ip_1.fc2_b4:HBM[4]
sp=chunk2_stream_ip_1.fc2_b5:HBM[3]
sp=chunk2_stream_ip_1.fc2_b6:HBM[2]
sp=chunk2_stream_ip_1.fc2_b7:HBM[1]

# --- c2_router final hidden output → HBM[0] ---
sp=c2_router_1.final_hidden_out:HBM[0]

[vivado]
prop=run.__KERNEL__.{STEPS.SYNTH_DESIGN.ARGS.MORE OPTIONS}={-directive sdx_optimization_effort_high}
prop=run.impl_1.strategy=Performance_ExplorePostRoutePhysOpt
